name: Notify publisher

# When page content changes, tell the private atk-publisher repo to re-render
# and publish. The bot's regenerate commits use [skip ci] so they don't loop.
on:
  push:
    branches: [main]
    paths:
      - "pages/**"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger atk-publisher sync
        env:
          TOKEN: ${{ secrets.PUBLISHER_DISPATCH_TOKEN }}   # PAT with access to the private tool repo
          # TODO: set to "<owner>/<private-tool-repo>" once the private repo exists.
          TARGET_REPO: Antikythera-Studios/atk-publisher
        run: |
          if [ -z "${TOKEN}" ]; then
            echo "PUBLISHER_DISPATCH_TOKEN not set yet; skipping dispatch."
            exit 0
          fi
          curl -sSf -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${TARGET_REPO}/dispatches" \
            -d '{"event_type":"pages-updated"}'
